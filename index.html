<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support Center</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f3f3f3;
}

/* 🔒 LOCK SCREEN */
#lockScreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
}

/* INPUT */
#lockScreen input {
  padding: 10px;
  margin-top: 10px;
  width: 200px;
}

/* BUTTON */
#lockScreen button {
  margin-top: 15px;
  padding: 10px;
  background: #ff9900;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}

/* IMAGE GRID */
.image-grid {
  display: grid;
  grid-template-columns: repeat(3, 80px);
  gap: 10px;
  margin-top: 15px;
}

.image-grid img {
  width: 80px;
  height: 80px;
  cursor: pointer;
  border: 3px solid transparent;
  border-radius: 8px;
}

.image-grid img.selected {
  border-color: green;
}

/* ❌ HIDE CONTENT */
#mainContent {
  display: none;
}

/* HEADER */
header {
  background: #131921;
  color: white;
  padding: 10px;
  display: flex;
  gap: 10px;
}

header img {
  width: 100px;
}

.container {
  padding: 20px;
}

.next-btn {
  margin-top: 15px;
  padding: 12px 20px;
  background: #ff9900;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- 🔒 BOT CHECK -->
<div id="lockScreen">
  <h2>Security Check</h2>

  <!-- MATH -->
  <p id="question"></p>
  <input type="number" id="answer" placeholder="Answer">

  <!-- IMAGE TASK -->
  <p><b>Select the CAT 🐱</b></p>

  <div class="image-grid" id="imageGrid"></div>

  <button onclick="verify()">Verify</button>
</div>

<!-- ✅ MAIN CONTENT -->
<div id="mainContent">
  <header>
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a9/Amazon_logo.svg">
    <b>Support Team</b>
  </header>

  <div class="container">
    <h2>Welcome to Support</h2>
    <p>You now have access.</p>
    <button class="next-btn" onclick="goNext()">Continue</button>
  </div>
</div>

<script>
// ⏱ 3 MIN EXPIRY
const EXPIRY_TIME = 180000;

// VERIFY STORAGE
function isVerified() {
  const t = localStorage.getItem("verifiedTime");
  if (!t) return false;
  return (Date.now() - t) < EXPIRY_TIME;
}

if (isVerified()) unlockPage();

// 🔢 MATH
let a = Math.floor(Math.random() * 10) + 1;
let b = Math.floor(Math.random() * 10) + 1;
let correctMath = a + b;

document.getElementById("question").innerText =
  "What is " + a + " + " + b + "?";

// 🖼 IMAGE DATA
const images = [
  {src: "https://cdn-icons-png.flaticon.com/128/616/616408.png", type: "cat"},
  {src: "https://cdn-icons-png.flaticon.com/128/616/616430.png", type: "dog"},
  {src: "https://cdn-icons-png.flaticon.com/128/616/616554.png", type: "lion"},
  {src: "https://cdn-icons-png.flaticon.com/128/616/616490.png", type: "cow"},
  {src: "https://cdn-icons-png.flaticon.com/128/616/616408.png", type: "cat"},
  {src: "https://cdn-icons-png.flaticon.com/128/616/616430.png", type: "dog"}
];

// SHUFFLE
images.sort(() => Math.random() - 0.5);

let selectedType = null;

// RENDER IMAGES
const grid = document.getElementById("imageGrid");

images.forEach((imgData, index) => {
  const img = document.createElement("img");
  img.src = imgData.src;

  img.onclick = () => {
    document.querySelectorAll(".image-grid img")
      .forEach(i => i.classList.remove("selected"));

    img.classList.add("selected");
    selectedType = imgData.type;
  };

  grid.appendChild(img);
});

// 🔒 VERIFY BOTH
function verify() {
  const userAnswer = parseInt(document.getElementById("answer").value);

  if (userAnswer === correctMath && selectedType === "cat") {
    localStorage.setItem("verifiedTime", Date.now());
    unlockPage();
  } else {
    alert("Verification failed! Try again.");
  }
}

// 🔓 UNLOCK
function unlockPage() {
  document.getElementById("lockScreen").style.display = "none";
  document.getElementById("mainContent").style.display = "block";
}

// ➡️ NEXT PAGE
function goNext() {
  window.location.href = "next.html";
}
</script>

</body>
</html>
